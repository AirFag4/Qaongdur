services:
  keycloak-postgres:
    profiles: ["core"]
    image: ${KEYCLOAK_POSTGRES_IMAGE}
    container_name: qaongdur-keycloak-postgres
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - keycloak-postgres-data:/var/lib/postgresql/data
    ports:
      - "${KEYCLOAK_DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER} -d ${KEYCLOAK_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    profiles: ["core"]
    image: ${KEYCLOAK_IMAGE}
    container_name: qaongdur-keycloak
    command:
      - start-dev
      - --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-postgres
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: ${KEYCLOAK_PUBLIC_URL}
      KC_HOSTNAME_STRICT: "false"
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    volumes:
      - ../keycloak/import:/opt/keycloak/data/import:ro
    ports:
      - "${KEYCLOAK_HTTP_PORT}:8080"
    depends_on:
      keycloak-postgres:
        condition: service_healthy

  postgres:
    profiles: ["core"]
    image: ${POSTGRES_IMAGE}
    container_name: qaongdur-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    profiles: ["core"]
    image: ${REDIS_IMAGE}
    container_name: qaongdur-redis
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  object-storage:
    profiles: ["core"]
    image: ${OBJECT_STORAGE_IMAGE}
    container_name: qaongdur-object-storage
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORAGE_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_ROOT_PASSWORD}
    volumes:
      - object-storage-data:/data
    ports:
      - "${OBJECT_STORAGE_PORT}:9000"
      - "${OBJECT_STORAGE_CONSOLE_PORT}:9001"

  object-storage-bootstrap:
    profiles: ["core"]
    image: ${OBJECT_STORAGE_CLIENT_IMAGE}
    depends_on:
      object-storage:
        condition: service_started
    entrypoint: /bin/sh
    command:
      - -c
      - |
        until mc alias set qaongdur http://object-storage:9000 "${OBJECT_STORAGE_ROOT_USER}" "${OBJECT_STORAGE_ROOT_PASSWORD}"; do sleep 1; done
        mc mb --ignore-existing qaongdur/${OBJECT_STORAGE_BUCKET}
        mc anonymous set private qaongdur/${OBJECT_STORAGE_BUCKET}
    restart: "no"

  mediamtx:
    profiles: ["core"]
    image: ${MEDIAMTX_IMAGE}
    container_name: qaongdur-mediamtx
    environment:
      MTX_PATHDEFAULTS_RECORDSEGMENTDURATION: ${MEDIAMTX_RECORD_SEGMENT_DURATION}
    volumes:
      - ../mediamtx/mediamtx.yml:/mediamtx.yml:ro
      - mediamtx-recordings:/recordings
    ports:
      - "${MEDIAMTX_RTSP_PORT}:8554"
      - "${MEDIAMTX_HLS_PORT}:8888"
      - "${MEDIAMTX_WEBRTC_PORT}:8889"
      - "${MEDIAMTX_PLAYBACK_PORT}:9996"
      - "${MEDIAMTX_API_PORT}:9997"

  recording-pruner:
    profiles: ["core"]
    build:
      context: ../..
      dockerfile: services/recording-pruner/Dockerfile
    container_name: qaongdur-recording-pruner
    environment:
      RECORDINGS_DIR: /recordings
      MEDIA_STORAGE_TOTAL_LIMIT_BYTES: ${MEDIA_STORAGE_TOTAL_LIMIT_BYTES}
      MEDIA_STORAGE_RECORDING_SHARE_PERCENT: ${MEDIA_STORAGE_RECORDING_SHARE_PERCENT}
      RECORDING_PRUNE_INTERVAL_SECONDS: ${RECORDING_PRUNE_INTERVAL_SECONDS}
    volumes:
      - mediamtx-recordings:/recordings
    depends_on:
      mediamtx:
        condition: service_started
    restart: unless-stopped

  mock-streamer:
    profiles: ["core", "mock-video", "mock-stream"]
    build:
      context: ../..
      dockerfile: services/mock-streamer/Dockerfile
    container_name: qaongdur-mock-streamer
    environment:
      MOCK_STREAM_TARGET_BASE_URL: rtsp://mediamtx:8554
      MOCK_STREAM_VIDEO_DIR: /mock-videos
      MOCK_STREAM_PATH_PREFIX: ${MOCK_VIDEO_PATH_PREFIX}
      MOCK_STREAM_MAX_SOURCES: ${MOCK_VIDEO_MAX_SOURCES:-1}
      MOCK_STREAM_SYNTHETIC_PATH: ${MOCK_STREAM_PATH:-mock-demo}
      MOCK_STREAM_WIDTH: ${MOCK_STREAM_WIDTH:-1280}
      MOCK_STREAM_HEIGHT: ${MOCK_STREAM_HEIGHT:-720}
      MOCK_STREAM_FPS: ${MOCK_STREAM_FPS:-15}
      MOCK_STREAM_BITRATE: ${MOCK_STREAM_BITRATE:-2500k}
    volumes:
      - ../../../Video:/mock-videos:ro
    depends_on:
      mediamtx:
        condition: service_started
    restart: unless-stopped

  control-api:
    profiles: ["core"]
    build:
      context: ../..
      dockerfile: services/control-api/Dockerfile
    container_name: qaongdur-control-api
    environment:
      QAONGDUR_ENV: production
      QAONGDUR_CONTROL_API_HOST: 0.0.0.0
      QAONGDUR_CONTROL_API_PORT: 8000
      QAONGDUR_CONTROL_API_CORS_ORIGINS: http://localhost:${WEB_PORT}
      QAONGDUR_KEYCLOAK_ISSUER_URL: ${KEYCLOAK_PUBLIC_URL}/realms/qaongdur-dev
      QAONGDUR_KEYCLOAK_DISCOVERY_URL: http://keycloak:8080/realms/qaongdur-dev
      QAONGDUR_KEYCLOAK_AUDIENCE: qaongdur-control-api
      QAONGDUR_KEYCLOAK_WEB_CLIENT_ID: qaongdur-web
      QAONGDUR_KEYCLOAK_EXPECTED_ALGORITHMS: RS256
      QAONGDUR_KEYCLOAK_STEP_UP_ACR: ${QAONGDUR_KEYCLOAK_STEP_UP_ACR}
      QAONGDUR_CAMERA_STORE_PATH: /data/cameras.json
      QAONGDUR_DEFAULT_SITE_ID: site-local-01
      QAONGDUR_DEFAULT_SITE_CODE: LOCAL-01
      QAONGDUR_DEFAULT_SITE_NAME: Local Camera Lab
      QAONGDUR_DEFAULT_SITE_REGION: Local
      QAONGDUR_MOCK_VIDEO_DIR: /mock-videos
      QAONGDUR_MOCK_VIDEO_PATH_PREFIX: ${MOCK_VIDEO_PATH_PREFIX}
      QAONGDUR_MOCK_VIDEO_MAX_SOURCES: ${MOCK_VIDEO_MAX_SOURCES:-1}
      QAONGDUR_MOCK_VIDEO_ZONE: Mock Video Lab
      QAONGDUR_MOCK_VIDEO_RTSP_BASE_URL: rtsp://mediamtx:8554
      QAONGDUR_MEDIAMTX_API_URL: http://mediamtx:9997
      QAONGDUR_MEDIAMTX_API_USER: qaongdur-api
      QAONGDUR_MEDIAMTX_API_PASSWORD: qaongdur-api
      QAONGDUR_MEDIAMTX_HLS_PUBLIC_URL: http://localhost:${MEDIAMTX_HLS_PORT}
      QAONGDUR_MEDIAMTX_PLAYBACK_INTERNAL_URL: http://mediamtx:9996
      QAONGDUR_MEDIAMTX_PLAYBACK_PUBLIC_URL: http://localhost:${MEDIAMTX_PLAYBACK_PORT}
      QAONGDUR_MEDIAMTX_RECORD_SEGMENT_DURATION_SECONDS: ${MEDIAMTX_RECORD_SEGMENT_DURATION_SECONDS}
      QAONGDUR_MEDIA_STORAGE_TOTAL_LIMIT_BYTES: ${MEDIA_STORAGE_TOTAL_LIMIT_BYTES}
      QAONGDUR_MEDIA_STORAGE_RECORDING_SHARE_PERCENT: ${MEDIA_STORAGE_RECORDING_SHARE_PERCENT}
      QAONGDUR_VISION_EMBEDDING_ENABLED: ${VISION_EMBEDDING_ENABLED}
      QAONGDUR_VISION_SERVICE_URL: http://vision:8010
      QAONGDUR_INTERNAL_SERVICE_TOKEN: ${QAONGDUR_INTERNAL_SERVICE_TOKEN}
    volumes:
      - control-api-data:/data
      - ../../../Video:/mock-videos:ro
    ports:
      - "${CONTROL_API_PORT}:8000"
    depends_on:
      keycloak:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      object-storage:
        condition: service_started
      mediamtx:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz').read()\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  face-api:
    profiles: ["face", "vision-cpu"]
    build:
      context: ../..
      dockerfile: services/face-api/Dockerfile
    container_name: qaongdur-face-api
    environment:
      QAONGDUR_FACE_ENV: production
      QAONGDUR_FACE_SERVICE_HOST: 0.0.0.0
      QAONGDUR_FACE_SERVICE_PORT: 8020
      QAONGDUR_FACE_RUNTIME_DIR: /runtime
      QAONGDUR_FACE_BOOTSTRAP_ERROR_FILE: /runtime/bootstrap-error.txt
      QAONGDUR_FACE_INSPIREFACE_REPO: /opt/third_party/InspireFace
      QAONGDUR_FACE_RESOURCE_PATH: /runtime/resources/pack/Megatron
      QAONGDUR_FACE_MODEL_NAME: Megatron
    volumes:
      - face-runtime:/runtime
    ports:
      - "${FACE_API_PORT}:8020"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8020/healthz').read()\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  qdrant:
    profiles: ["vision-cpu"]
    image: ${QDRANT_IMAGE}
    container_name: qaongdur-qdrant
    ports:
      - "${QDRANT_PORT}:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  web:
    profiles: ["core"]
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_KEYCLOAK_URL: ${KEYCLOAK_PUBLIC_URL}
        VITE_KEYCLOAK_REALM: qaongdur-dev
        VITE_KEYCLOAK_CLIENT_ID: qaongdur-web
        VITE_KEYCLOAK_STEP_UP_ACR: ${QAONGDUR_KEYCLOAK_STEP_UP_ACR}
        VITE_CONTROL_API_BASE_URL: http://localhost:${CONTROL_API_PORT}
    container_name: qaongdur-web
    ports:
      - "${WEB_PORT}:5173"
    depends_on:
      control-api:
        condition: service_healthy
      keycloak:
        condition: service_started
      object-storage-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:5173 >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 10

  vision:
    profiles: ["vision-cpu"]
    build:
      context: ../..
      dockerfile: services/vision/Dockerfile
    container_name: qaongdur-vision
    environment:
      QAONGDUR_VISION_ENV: production
      QAONGDUR_VISION_SERVICE_HOST: 0.0.0.0
      QAONGDUR_VISION_SERVICE_PORT: 8010
      QAONGDUR_VISION_SAMPLE_MODE: "true"
      QAONGDUR_VISION_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET}
      QAONGDUR_VISION_DEFAULT_SITE_ID: site-local-01
      QAONGDUR_VISION_MOCK_VIDEO_DIR: /mock-videos
      QAONGDUR_VISION_MOCK_VIDEO_RTSP_BASE_URL: rtsp://mediamtx:8554
      QAONGDUR_VISION_MOCK_VIDEO_PATH_PREFIX: ${MOCK_VIDEO_PATH_PREFIX}
      QAONGDUR_VISION_MOCK_VIDEO_USE_VMS: "true"
      QAONGDUR_VISION_DATA_DIR: /data
      QAONGDUR_VISION_DATABASE_PATH: /data/vision.sqlite3
      QAONGDUR_VISION_ARTIFACTS_DIR: /data/artifacts
      QAONGDUR_VISION_SAMPLE_FPS: ${VISION_SAMPLE_FPS}
      QAONGDUR_VISION_STORAGE_TOTAL_LIMIT_BYTES: ${MEDIA_STORAGE_TOTAL_LIMIT_BYTES}
      QAONGDUR_VISION_STORAGE_RECORDING_SHARE_PERCENT: ${MEDIA_STORAGE_RECORDING_SHARE_PERCENT}
      QAONGDUR_VISION_EMBEDDING_ENABLED: ${VISION_EMBEDDING_ENABLED}
      QAONGDUR_VISION_FACE_ENABLED: ${VISION_FACE_ENABLED}
      QAONGDUR_VISION_FACE_MIN_TRACK_SECONDS: ${VISION_FACE_MIN_TRACK_SECONDS}
      QAONGDUR_VISION_FACE_MODEL_NAME: Megatron
      QAONGDUR_VISION_FACE_SERVICE_URL: http://face-api:8020
      QAONGDUR_VISION_CONTROL_API_URL: http://control-api:8000
      QAONGDUR_VISION_INTERNAL_SERVICE_TOKEN: ${QAONGDUR_INTERNAL_SERVICE_TOKEN}
      QAONGDUR_VISION_RECORDINGS_DIR: /recordings
      QAONGDUR_VISION_SEGMENT_POLL_INTERVAL_SECONDS: ${VISION_SEGMENT_POLL_INTERVAL_SECONDS}
      QAONGDUR_VISION_SEGMENT_MIN_AGE_SECONDS: ${VISION_SEGMENT_MIN_AGE_SECONDS}
      QAONGDUR_VISION_SEGMENT_WORKER_COUNT: ${VISION_SEGMENT_WORKER_COUNT:-1}
      QAONGDUR_VISION_MOCK_VIDEO_MAX_SOURCES: ${MOCK_VIDEO_MAX_SOURCES:-1}
      QAONGDUR_VISION_PURGE_RETIRED_MOCK_HISTORY: ${VISION_PURGE_RETIRED_MOCK_HISTORY:-false}
      QAONGDUR_VISION_VECTOR_STORE_ENABLED: "true"
      QAONGDUR_VISION_VECTOR_STORE_URL: http://qdrant:6333
    volumes:
      - ../../../Video:/mock-videos:ro
      - mediamtx-recordings:/recordings:ro
      - vision-data:/data
    ports:
      - "${VISION_PORT}:8010"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      object-storage:
        condition: service_started
      mediamtx:
        condition: service_started
      face-api:
        condition: service_started
      control-api:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/healthz').read()\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  keycloak-postgres-data:
  postgres-data:
  object-storage-data:
  mediamtx-recordings:
  control-api-data:
  vision-data:
  face-runtime:
  qdrant-data:
